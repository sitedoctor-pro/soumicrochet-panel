<!doctype html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7a1730" />
  <title>Admin Login | Soumi Crochet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card glass">
      <img src="../assets/img/logo.png" alt="Soumi Crochet" class="auth-logo" />
      <span class="eyebrow">ADMIN ACCESS</span>
      <h1>Soumi Crochet Dashboard</h1>
      <p>Connexion sécurisée via Supabase Auth.</p>

      <form id="loginForm" class="auth-form">
        <label>
          <span>Email</span>
          <input id="email" type="email" autocomplete="email" required />
        </label>
        <label>
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="btn btn-primary" type="submit">Se connecter</button>
        <p class="form-note" id="loginMessage"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://axgcycsojorwztwlfprg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_1YuKU9O3wuH1Zbikx_OonQ_ayCIjmSR';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('loginMessage');

    client.auth.getSession().then(({ data }) => {
      if(data.session) window.location.href = 'index.html';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = 'Connexion...';
      const { error } = await client.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      });
      if(error){
        msg.textContent = error.message;
        return;
      }
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
